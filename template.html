<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} - 个人名片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08), 0 2px 10px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12), 0 4px 15px rgba(0, 0, 0, 0.06);
        }

        .card-header {
            height: 6px;
            background: linear-gradient(90deg, #3b82f6, #ef4444, #f97316);
        }

        .card-body {
            padding: 32px 28px;
            text-align: center;
        }

        .avatar-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 3px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 42px;
            color: #ccc;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e5ea, transparent);
            margin-bottom: 24px;
        }

        .links-title {
            font-size: 12px;
            color: #aeaeb2;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.3s ease;
        }

        .link-btn:hover::before {
            background: rgba(255, 255, 255, 0.15);
        }

        .link-btn:hover {
            transform: translateX(6px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .link-btn:active {
            transform: translateX(3px);
        }

        .link-btn.website {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .link-btn.video {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .link-btn.xiaohongshu {
            background: linear-gradient(135deg, #f97316, #ea580c);
        }

        .link-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .link-icon svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }

        .link-text {
            flex: 1;
            text-align: left;
        }

        .link-label {
            font-size: 15px;
            font-weight: 600;
        }

        .link-desc {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .link-arrow {
            font-size: 18px;
            opacity: 0.7;
        }

        .card-footer {
            padding: 16px 28px;
            text-align: center;
            border-top: 1px solid #f2f2f7;
        }

        .card-footer p {
            font-size: 11px;
            color: #c7c7cc;
            letter-spacing: 1px;
        }

        @media (max-width: 460px) {
            .card-body {
                padding: 24px 20px;
            }
            .name {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header"></div>
        <div class="card-body">
            <div class="avatar-wrapper">
                <div class="avatar">
                    <img src="{{AVATAR_URL}}" alt="头像" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\'avatar-placeholder\'>👤</span>';">
                </div>
            </div>

            <h1 class="name">{{NAME}}</h1>
            <p class="bio">{{BIO}}</p>

            <div class="divider"></div>

            <p class="links-title">我的链接</p>
            <div class="links">

                <a href="{{WEBSITE_URL}}" target="_blank" class="link-btn website">
                    <div class="link-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    </div>
                    <div class="link-text">
                        <div class="link-label">个人网址</div>
                        <div class="link-desc">访问我的个人网站</div>
                    </div>
                    <span class="link-arrow">›</span>
                </a>

                <a href="{{VIDEO_URL}}" target="_blank" class="link-btn video">
                    <div class="link-icon">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <div class="link-text">
                        <div class="link-label">视频号</div>
                        <div class="link-desc">关注我的视频号</div>
                    </div>
                    <span class="link-arrow">›</span>
                </a>

                <a href="{{XIAOHONGSHU_URL}}" target="_blank" class="link-btn xiaohongshu">
                    <div class="link-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                    <div class="link-text">
                        <div class="link-label">小红书</div>
                        <div class="link-desc">关注我的小红书</div>
                    </div>
                    <span class="link-arrow">›</span>
                </a>

            </div>
        </div>

        <div class="card-footer">
            <p>点击上方按钮即可跳转</p>
        </div>
    </div>
</body>
</html>
